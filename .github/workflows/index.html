<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RWF Efficiency Tracker</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: #f8fafc; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .boss-dot { transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1); }
        .pull-badge { font-size: 8px; transform: translateY(12px); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const DATA = {
            bosses: ["Eranog", "Terros", "Sennarth", "Dathea", "Kurog", "Diurna", "Raszageth"],
            teams: [
                { 
                    id: 'na', name: "Liquid", region: "NA", offset: 0, color: "#ef4444", 
                    kills: [10, 14, 19, 26, 34, 42, 58],
                    pulls: [1, 12, 45, 89, 112, 156, 342]
                },
                { 
                    id: 'eu', name: "Echo", region: "EU", offset: 16, color: "#3b82f6", 
                    kills: [18, 22, 25, 30, 36, 44, 59],
                    pulls: [1, 8, 32, 76, 105, 140, 289]
                }
            ]
        };

        function App() {
            const [mode, setMode] = useState('elapsed');

            const getX = (killTime, offset) => {
                const time = mode === 'elapsed' ? (killTime - offset) : killTime;
                return (time / 70) * 100;
            };

            return (
                <div className="max-w-6xl mx-auto p-6 md:p-12">
                    <div className="flex justify-between items-center mb-10">
                        <h1 className="text-3xl font-black tracking-tighter italic">
                            <span className="text-orange-500">PROG</span>RESS
                        </h1>
                        <div className="flex bg-slate-900 p-1 rounded-xl border border-slate-800 shadow-2xl">
                            <button onClick={() => setMode('clock')} className={`px-4 py-2 rounded-lg text-xs font-bold transition-all ${mode === 'clock' ? 'bg-slate-700 text-white' : 'text-slate-500 hover:text-slate-300'}`}>CLOCK</button>
                            <button onClick={() => setMode('elapsed')} className={`px-4 py-2 rounded-lg text-xs font-bold transition-all ${mode === 'elapsed' ? 'bg-orange-600 text-white' : 'text-slate-500 hover:text-slate-300'}`}>ELAPSED</button>
                        </div>
                    </div>

                    {/* Timeline Track */}
                    <div className="bg-slate-900/50 border border-slate-800 rounded-3xl p-12 mb-8 relative">
                         {/* Day Markers */}
                         {[0, 24, 48, 72].map(h => (
                            <div key={h} className="absolute h-full border-l border-slate-800/40 top-0" style={{ left: `${(h/70)*100}%` }}>
                                <span className="absolute top-4 left-2 text-[10px] font-bold text-slate-700 uppercase">Day {Math.floor(h/24)+1}</span>
                            </div>
                        ))}

                        {DATA.teams.map((team) => (
                            <div key={team.id} className="relative h-24 flex items-center">
                                <div className="absolute w-full h-0.5 bg-slate-800 rounded-full"></div>
                                <div className="absolute -left-4 -translate-x-full text-right">
                                    <div className="text-xs font-black uppercase tracking-tighter" style={{ color: team.color }}>{team.name}</div>
                                    <div className="text-[10px] text-slate-600 uppercase font-bold">{team.region}</div>
                                </div>

                                {team.kills.map((time, bIdx) => {
                                    const xPos = getX(time, team.offset);
                                    if (xPos < 0) return null;
                                    return (
                                        <div key={bIdx} className="boss-dot absolute group" style={{ left: `${xPos}%` }}>
                                            <div className="w-8 h-8 rounded-lg border-2 border-slate-950 flex items-center justify-center rotate-45 shadow-xl transition-all group-hover:rotate-0 group-hover:scale-110" style={{ backgroundColor: team.color }}>
                                                <span className="text-[10px] text-white font-black -rotate-45 group-hover:rotate-0">{bIdx + 1}</span>
                                            </div>
                                            {/* Pull Count Badge */}
                                            <div className="absolute -bottom-6 left-1/2 -translate-x-1/2 bg-slate-800 px-1.5 py-0.5 rounded text-[9px] font-mono font-bold text-slate-400 border border-slate-700">
                                                {team.pulls[bIdx]}P
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        ))}
                    </div>

                    {/* Stats Table */}
                    <div className="overflow-x-auto rounded-2xl border border-slate-800 bg-slate-900/30">
                        <table className="w-full text-left">
                            <thead className="bg-slate-800/50 text-[10px] font-black uppercase text-slate-500 tracking-widest">
                                <tr>
                                    <th className="p-6">Boss</th>
                                    <th className="p-6">Liquid (Time/Pulls)</th>
                                    <th className="p-6">Echo (Time/Pulls)</th>
                                    <th className="p-6 text-right">Efficiency Delta</th>
                                </tr>
                            </thead>
                            <tbody className="divide-y divide-slate-800">
                                {DATA.bosses.map((boss, i) => {
                                    const lPulls = DATA.teams[0].pulls[i];
                                    const ePulls = DATA.teams[1].pulls[i];
                                    const pullDelta = lPulls - ePulls;

                                    return (
                                        <tr key={boss} className="hover:bg-slate-800/20 transition-colors">
                                            <td className="p-6 font-bold">{boss}</td>
                                            <td className="p-6">
                                                <div className="text-sm font-mono text-red-400">T+{DATA.teams[0].kills[i] - DATA.teams[0].offset}h</div>
                                                <div className="text-[10px] text-slate-500 font-bold uppercase">{lPulls} Pulls</div>
                                            </td>
                                            <td className="p-6">
                                                <div className="text-sm font-mono text-blue-400">T+{DATA.teams[1].kills[i] - DATA.teams[1].offset}h</div>
                                                <div className="text-[10px] text-slate-500 font-bold uppercase">{ePulls} Pulls</div>
                                            </td>
                                            <td className="p-6 text-right">
                                                <span className={`text-xs font-black px-2 py-1 rounded ${pullDelta < 0 ? 'bg-red-500/10 text-red-500' : 'bg-blue-500/10 text-blue-500'}`}>
                                                    {pullDelta < 0 ? `LIQUID -${Math.abs(pullDelta)} PULLS` : `ECHO -${pullDelta} PULLS`}
                                                </span>
                                            </td>
                                        </tr>
                                    );
                                })}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
