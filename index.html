<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global RWF Hub - 2026</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #020617; color: #f1f5f9; }
        .raid-card { background: linear-gradient(145deg, rgba(30,41,59,0.4) 0%, rgba(15,23,42,0.8) 100%); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const RAIDS = [
            { name: "The Dreamrift", bosses: ["Chimarerus"] },
            { name: "The Voidspire", bosses: ["Imperator Averzian", "Vorasius", "Fallen-King Salhadaar", "Vaelgot & Ezzorak", "Lightblind Vanguard", "Crown of the Cosmos"] },
            { name: "March on Quel'Danas", bosses: ["Belo'ran", "Midnight Falls"] }
        ];

        const TEAMS = [
            { name: "Liquid", region: "NA", offset: 0, color: "#f87171", kills: [8, 14, 22, 30, 45, 52, 68, 80, 95] },
            { name: "Echo", region: "EU", offset: 16, color: "#60a5fa", kills: [19, 24, 30, 36, 48, 55, 70, 82, 98] },
            { name: "Method", region: "EU", offset: 16, color: "#fbbf24", kills: [20, 26, 33, 40, 50, 58, 74, 85, 102] }
        ];

        // Helper to turn hours into "1d 4h"
        const formatTime = (hours) => {
            const d = Math.floor(hours / 24);
            const h = hours % 24;
            return d > 0 ? `${d}d ${h}h` : `${h}h`;
        };

        function App() {
            const [isElapsed, setIsElapsed] = useState(true);

            // Flatten all bosses into one list for indexing
            const allBosses = RAIDS.flatMap(r => r.bosses);

            return (
                <div className="max-w-6xl mx-auto p-4 md:p-10">
                    <header className="flex flex-col md:flex-row justify-between items-center mb-10 gap-6">
                        <div className="text-center md:text-left">
                            <h1 className="text-4xl font-black tracking-tight text-white italic">RWF <span className="text-orange-500">DASHBOARD</span></h1>
                            <p className="text-slate-500 text-sm font-bold tracking-widest uppercase mt-1">Global Tier Progress</p>
                        </div>
                        <div className="flex bg-slate-900 p-1 rounded-2xl border border-slate-800 shadow-xl">
                            <button onClick={() => setIsElapsed(false)} className={`px-6 py-2 rounded-xl text-xs font-black transition-all ${!isElapsed ? 'bg-slate-700' : 'text-slate-500 hover:text-white'}`}>GLOBAL CLOCK</button>
                            <button onClick={() => setIsElapsed(true)} className={`px-6 py-2 rounded-xl text-xs font-black transition-all ${isElapsed ? 'bg-orange-600' : 'text-slate-500 hover:text-white'}`}>FAIR ELAPSED</button>
                        </div>
                    </header>

                    {/* RAID SECTIONS */}
                    <div className="space-y-12">
                        {RAIDS.map((raid, raidIdx) => (
                            <section key={raid.name} className="raid-card border border-slate-800 rounded-3xl p-6 md:p-8 shadow-2xl overflow-hidden">
                                <h2 className="text-xl font-black mb-6 text-slate-400 border-l-4 border-orange-500 pl-4">{raid.name.toUpperCase()}</h2>
                                
                                <div className="grid grid-cols-1 gap-4">
                                    {raid.bosses.map((boss, bIdx) => {
                                        // Calculate the global index across all raids
                                        const globalIdx = allBosses.indexOf(boss);
                                        
                                        return (
                                            <div key={boss} className="flex flex-col lg:flex-row lg:items-center justify-between p-5 bg-slate-950/50 rounded-2xl border border-slate-800/50 gap-4 hover:border-slate-700 transition-colors">
                                                <div className="flex items-center gap-4 min-w-[250px]">
                                                    <span className="h-8 w-8 rounded-lg bg-slate-800 flex items-center justify-center text-xs font-black text-slate-500">{globalIdx + 1}</span>
                                                    <span className="font-bold text-lg text-slate-200">{boss}</span>
                                                </div>

                                                <div className="grid grid-cols-3 gap-2 md:gap-4 flex-grow max-w-2xl">
                                                    {TEAMS.map(team => {
                                                        const rawTime = team.kills[globalIdx];
                                                        const displayTime = isElapsed ? (rawTime - team.offset) : rawTime;
                                                        
                                                        return (
                                                            <div key={team.name} className="flex flex-col items-center p-3 rounded-xl bg-slate-900/40 border border-slate-800">
                                                                <span className="text-[10px] font-black uppercase tracking-tighter" style={{color: team.color}}>{team.name}</span>
                                                                <span className="text-sm font-bold mt-1">{formatTime(displayTime)}</span>
                                                                <span className="text-[9px] text-slate-500 font-bold uppercase mt-1 italic">{team.region} Reset</span>
                                                            </div>
                                                        );
                                                    })}
                                                </div>

                                                <div className="flex flex-col items-end justify-center px-4">
                                                    <span className="text-[10px] text-slate-500 font-black uppercase">Winner</span>
                                                    <span className="text-xs font-bold text-green-400">
                                                        {TEAMS.reduce((prev, curr) => (curr.kills[globalIdx] - curr.offset < prev.kills[globalIdx] - prev.offset ? curr : prev)).name}
                                                    </span>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </section>
                        ))}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
