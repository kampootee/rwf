<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RWF Live - Server Offset Edition</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;800&family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #020617; color: #f1f5f9; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .boss-tick { position: absolute; width: 2px; height: 100%; background: rgba(255,255,255,0.2); z-index: 10; }
        .progress-bar { transition: width 1s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // --- CONFIGURATION OPTION ---
        // Enter the time servers actually came up (in minutes from 00:00 Tuesday)
        // Example: 08:00 = 480 | 13:00 = 780
        const REGION_CONFIG = {
            NA: { serverUp: 780 }, // Servers were up at 13:00 (1:00 PM)
            EU: { serverUp: 2400 } // Tuesday 00:00 + 1d + 16h (adjust as needed)
        };

        const RAIDS = [
            { name: "The Dreamrift", bosses: ["Chimarerus"], color: "from-emerald-500 to-teal-700" },
            { name: "The Voidspire", bosses: ["Imperator Averzian", "Vorasius", "Fallen-King Salhadaar", "Vaelgot & Ezzorak", "Lightblind Vanguard", "Crown of the Cosmos"], color: "from-purple-600 to-indigo-900" },
            { name: "March on Quel'Danas", bosses: ["Belo'ran", "Midnight Falls"], color: "from-orange-500 to-red-700" }
        ];

        const TEAMS = [
            { name: "Liquid", region: "NA", color: "#ef4444", kills: [900, 1100, 1400, 1900, 2800, 3200, 4100, 4900, 5800] },
            { name: "Echo", region: "EU", color: "#3b82f6", kills: [2500, 2700, 3100, 3500, 4200, 4500, 5200, 5900, 6400] },
            { name: "Method", region: "EU", color: "#fbbf24", kills: [2550, 2800, 3200, 3700, 4400, 4700, 5400, 6100, 6600] }
        ];

        const formatPreciseTime = (totalMinutes) => {
            if (totalMinutes < 0) return "--:--";
            const d = Math.floor(totalMinutes / 1440);
            const h = Math.floor((totalMinutes % 1440) / 60);
            const m = totalMinutes % 60;
            return `${d > 0 ? d + 'd ' : ''}${h.toString().padStart(2, '0')}h ${m.toString().padStart(2, '0')}m`;
        };

        function App() {
            const [isElapsed, setIsElapsed] = useState(true);
            const allBosses = RAIDS.flatMap(r => r.bosses);
            const maxTimelineWindow = 7200; 

            return (
                <div className="max-w-6xl mx-auto p-4 md:p-10">
                    <header className="flex flex-col md:flex-row justify-between items-center mb-8 gap-6 border-b border-slate-800 pb-8">
                        <div>
                            <h1 className="text-3xl font-black tracking-tight text-white italic">RWF <span className="text-orange-500">2026</span></h1>
                            <div className="flex gap-4 mt-2">
                                <span className="text-[10px] font-bold text-slate-500 uppercase">NA Open: <span className="text-slate-300">{formatPreciseTime(REGION_CONFIG.NA.serverUp)}</span></span>
                                <span className="text-[10px] font-bold text-slate-500 uppercase">EU Open: <span className="text-slate-300">{formatPreciseTime(REGION_CONFIG.EU.serverUp)}</span></span>
                            </div>
                        </div>
                        <div className="flex bg-slate-900 p-1 rounded-xl border border-slate-800">
                            <button onClick={() => setIsElapsed(false)} className={`px-5 py-2 rounded-lg text-xs font-black transition-all ${!isElapsed ? 'bg-slate-700 text-white' : 'text-slate-500'}`}>CLOCK TIME</button>
                            <button onClick={() => setIsElapsed(true)} className={`px-5 py-2 rounded-lg text-xs font-black transition-all ${isElapsed ? 'bg-orange-600 text-white' : 'text-slate-500'}`}>ELAPSED</button>
                        </div>
                    </header>

                    {/* TOP LIVE LANES */}
                    <div className="bg-slate-900/40 border border-slate-800 rounded-3xl p-8 mb-12 shadow-inner relative">
                        <div className="space-y-8">
                            {TEAMS.map((team) => {
                                const lastKill = team.kills[team.kills.length - 1];
                                const serverUp = REGION_CONFIG[team.region].serverUp;
                                const displayMins = isElapsed ? (lastKill - serverUp) : lastKill;
                                const totalWidth = (displayMins / maxTimelineWindow) * 100;

                                return (
                                    <div key={team.name} className="relative">
                                        <div className="flex justify-between items-center mb-2 px-1">
                                            <div className="flex items-center gap-2">
                                                <span className="w-2 h-2 rounded-full" style={{backgroundColor: team.color}}></span>
                                                <span className="text-sm font-black uppercase tracking-widest">{team.name}</span>
                                            </div>
                                            <span className="mono text-xs font-bold text-slate-400">{formatPreciseTime(displayMins)}</span>
                                        </div>
                                        <div className="h-6 bg-black/40 rounded-full border border-slate-800 p-1 relative overflow-hidden">
                                            <div 
                                                className="progress-bar h-full rounded-full relative z-0 shadow-lg"
                                                style={{ width: `${Math.max(0, totalWidth)}%`, backgroundColor: team.color }}
                                            />
                                            {/* Boss Ticks */}
                                            {team.kills.map((mins, i) => {
                                                const tickTime = isElapsed ? (mins - serverUp) : mins;
                                                const x = (tickTime / maxTimelineWindow) * 100;
                                                if (x < 0) return null;
                                                return <div key={i} className="boss-tick" style={{ left: `${x}%` }}></div>
                                            })}
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </div>

                    {/* BOSS BREAKDOWN */}
                    <div className="space-y-12">
                        {RAIDS.map((raid) => (
                            <div key={raid.name} className="space-y-6">
                                <h2 className={`text-sm font-black tracking-[0.3em] uppercase py-2 px-6 border border-slate-700 rounded-full bg-slate-900 text-slate-300 inline-block`}>
                                    {raid.name}
                                </h2>
                                
                                <div className="grid grid-cols-1 gap-3">
                                    {raid.bosses.map((boss) => {
                                        const gIdx = allBosses.indexOf(boss);
                                        const winner = TEAMS.reduce((a, b) => {
                                            const aElapsed = a.kills[gIdx] - REGION_CONFIG[a.region].serverUp;
                                            const bElapsed = b.kills[gIdx] - REGION_CONFIG[b.region].serverUp;
                                            return aElapsed < bElapsed ? a : b;
                                        });

                                        return (
                                            <div key={boss} className="flex flex-col lg:flex-row items-center bg-slate-900/20 border border-slate-800/60 rounded-2xl p-4 gap-6">
                                                <div className="lg:w-1/4">
                                                    <div className="text-[10px] font-bold text-slate-600 mb-1">BOSS {gIdx + 1}</div>
                                                    <div className="font-bold text-lg leading-tight">{boss}</div>
                                                </div>

                                                <div className="flex flex-1 justify-center gap-4 w-full">
                                                    {TEAMS.map(team => {
                                                        const serverUp = REGION_CONFIG[team.region].serverUp;
                                                        const time = isElapsed ? (team.kills[gIdx] - serverUp) : team.kills[gIdx];
                                                        const isWinner = team.name === winner.name;
                                                        
                                                        return (
                                                            <div key={team.name} className={`flex-1 min-w-[100px] p-3 rounded-xl border transition-all ${isWinner ? 'border-slate-500 bg-slate-800/40 shadow-lg' : 'border-slate-800 bg-slate-950/50'}`}>
                                                                <div className="text-[9px] font-black uppercase mb-1" style={{color: team.color}}>{team.name}</div>
                                                                <div className="mono text-xs font-bold">{formatPreciseTime(time)}</div>
                                                            </div>
                                                        );
                                                    })}
                                                </div>

                                                <div className="lg:w-1/5 text-right border-l border-slate-800 pl-6">
                                                    <div className="text-[10px] text-slate-500 font-black uppercase">Pace Leader</div>
                                                    <div className="text-sm font-black italic" style={{color: winner.color}}>{winner.name}</div>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
