<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RWF - Time Since Release</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;800&family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #020617; color: #f1f5f9; }
        .mono { font-family: 'JetBrains Mono', monospace; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // --- ADMIN CONFIG ---
        // Input format "HH:MM" (Military Time)
        const SERVER_START_TIMES = {
            NA: "08:30", // NA Servers Live
            EU: "23:00"  // EU Servers Live (Rel. to NA Start Day)
        };

        const timeStringToMins = (str) => {
            const [h, m] = str.split(':').map(Number);
            return (h * 60) + m;
        };

        const REGION_OFFSETS = {
            NA: timeStringToMins(SERVER_START_TIMES.NA),
            EU: timeStringToMins(SERVER_START_TIMES.EU)
        };

        const RAIDS = [
            { name: "The Dreamrift", bosses: ["Chimarerus"], color: "emerald-500" },
            { name: "The Voidspire", bosses: ["Imperator Averzian", "Vorasius", "Fallen-King Salhadaar", "Vaelgot & Ezzorak", "Lightblind Vanguard", "Crown of the Cosmos"], color: "purple-500" },
            { name: "March on Quel'Danas", bosses: ["Belo'ran", "Midnight Falls"], color: "orange-500" }
        ];

        const TEAMS = [
            { name: "Liquid", region: "NA", color: "#ef4444", kills: [600, 1100, 1400, 1900, 2800, 3200, 4100, 4900, 5800] },
            { name: "Echo", region: "EU", color: "#3b82f6", kills: [1500, 1600, 1850, 2400, 3100, 3500, 4200, 4950, 6000] },
            { name: "Method", region: "EU", color: "#fbbf24", kills: [1520, 1650, 1900, 2500, 3200, 3600, 4400, 5100, 6200] }
        ];

        const formatDuration = (totalMinutes) => {
            if (totalMinutes < 0) return "Not Started";
            const d = Math.floor(totalMinutes / 1440);
            const h = Math.floor((totalMinutes % 1440) / 60);
            const m = totalMinutes % 60;
            return `${d > 0 ? d + 'd ' : ''}${h}h ${m}m`;
        };

        function App() {
            const [mode, setMode] = useState('release'); // 'global' or 'release'
            const allBosses = RAIDS.flatMap(r => r.bosses);

            return (
                <div className="max-w-5xl mx-auto p-6 md:p-12">
                    <header className="flex flex-col md:flex-row justify-between items-end mb-12 gap-6 border-b border-slate-800 pb-10">
                        <div>
                            <h1 className="text-4xl font-black tracking-tighter italic text-white uppercase">
                                RWF <span className="text-orange-600">Tracker</span>
                            </h1>
                            <div className="flex gap-4 mt-3">
                                {Object.entries(SERVER_START_TIMES).map(([reg, time]) => (
                                    <div key={reg} className="bg-slate-900 px-3 py-1 rounded border border-slate-800">
                                        <span className="text-[10px] font-black text-slate-500 uppercase mr-2">{reg} Live:</span>
                                        <span className="mono text-[10px] text-orange-400 font-bold">{time}</span>
                                    </div>
                                ))}
                            </div>
                        </div>

                        <div className="flex bg-slate-900 p-1 rounded-2xl border border-slate-800 shadow-2xl">
                            <button onClick={() => setMode('global')} className={`px-6 py-2 rounded-xl text-xs font-black transition-all ${mode === 'global' ? 'bg-slate-700 text-white shadow-lg' : 'text-slate-500'}`}>GLOBAL TIME</button>
                            <button onClick={() => setMode('release')} className={`px-6 py-2 rounded-xl text-xs font-black transition-all ${mode === 'release' ? 'bg-orange-600 text-white shadow-lg' : 'text-slate-500'}`}>TIME SINCE RELEASE</button>
                        </div>
                    </header>

                    {/* TOP VISUAL BAR */}
                    <div className="bg-slate-900/40 border border-slate-800 rounded-3xl p-8 mb-16 relative overflow-hidden">
                        <div className="space-y-10">
                            {TEAMS.map((team) => {
                                const lastKill = team.kills[team.kills.length - 1];
                                const offset = REGION_OFFSETS[team.region];
                                const displayMins = mode === 'release' ? (lastKill - offset) : lastKill;
                                const progressWidth = (displayMins / 6000) * 100;

                                return (
                                    <div key={team.name} className="relative group">
                                        <div className="flex justify-between items-center mb-2 px-1">
                                            <span className="text-xs font-black uppercase tracking-[0.2em]" style={{color: team.color}}>{team.name}</span>
                                            <span className="mono text-[10px] font-bold text-slate-400">{formatDuration(displayMins)}</span>
                                        </div>
                                        <div className="h-4 bg-black rounded-full border border-slate-800 p-0.5 overflow-hidden">
                                            <div 
                                                className="h-full rounded-full transition-all duration-1000 shadow-[0_0_15px_rgba(0,0,0,0.5)]"
                                                style={{ width: `${Math.max(0, progressWidth)}%`, backgroundColor: team.color }}
                                            />
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </div>

                    {/* BOSS ROWS */}
                    <div className="space-y-16">
                        {RAIDS.map((raid) => (
                            <div key={raid.name} className="relative">
                                <h2 className={`text-[10px] font-black tracking-[0.4em] uppercase mb-6 text-${raid.color} opacity-80`}>
                                    {raid.name}
                                </h2>
                                
                                <div className="grid grid-cols-1 gap-4">
                                    {raid.bosses.map((boss) => {
                                        const gIdx = allBosses.indexOf(boss);
                                        const winner = TEAMS.reduce((a, b) => {
                                            const aVal = a.kills[gIdx] - REGION_OFFSETS[a.region];
                                            const bVal = b.kills[gIdx] - REGION_OFFSETS[b.region];
                                            return aVal < bVal ? a : b;
                                        });

                                        return (
                                            <div key={boss} className="flex flex-col lg:flex-row items-center bg-slate-900/20 border border-slate-800 rounded-2xl p-5 gap-6 hover:bg-slate-800/30 transition-all">
                                                <div className="lg:w-1/4">
                                                    <div className="text-[9px] font-black text-slate-600 mb-1">OBJECTIVE {gIdx + 1}</div>
                                                    <div className="font-black text-lg text-slate-200 uppercase tracking-tight leading-none">{boss}</div>
                                                </div>

                                                <div className="flex-1 flex gap-3 w-full">
                                                    {TEAMS.map(team => {
                                                        const offset = REGION_OFFSETS[team.region];
                                                        const val = mode === 'release' ? (team.kills[gIdx] - offset) : team.kills[gIdx];
                                                        return (
                                                            <div key={team.name} className="flex-1 bg-slate-950 p-4 rounded-xl border border-slate-800 text-center">
                                                                <div className="text-[9px] font-black uppercase mb-2" style={{color: team.color}}>{team.name}</div>
                                                                <div className="mono text-xs font-bold">{formatDuration(val)}</div>
                                                            </div>
                                                        );
                                                    })}
                                                </div>

                                                <div className="lg:w-1/5 text-right flex flex-col items-end border-l border-slate-800 pl-6">
                                                    <div className="text-[9px] text-slate-500 font-black uppercase tracking-widest mb-1">Fastest Kill</div>
                                                    <div className="text-sm font-black italic tracking-tighter" style={{color: winner.color}}>{winner.name}</div>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
