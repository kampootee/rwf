<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RWF Precision Tracker</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;800&family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #020617; color: #f1f5f9; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .boss-marker { transition: all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .timeline-glow { box-shadow: 0 0 20px rgba(249, 115, 22, 0.1); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const RAIDS = [
            { name: "The Dreamrift", bosses: ["Chimarerus"], color: "from-emerald-500 to-teal-700" },
            { name: "The Voidspire", bosses: ["Imperator Averzian", "Vorasius", "Fallen-King Salhadaar", "Vaelgot & Ezzorak", "Lightblind Vanguard", "Crown of the Cosmos"], color: "from-purple-600 to-indigo-900" },
            { name: "March on Quel'Danas", bosses: ["Belo'ran", "Midnight Falls"], color: "from-orange-500 to-red-700" }
        ];

        // kills are stored in TOTAL MINUTES from global start
        const TEAMS = [
            { name: "Liquid", region: "NA", offset: 0, color: "#ef4444", kills: [485, 842, 1320, 1845, 2700, 3122, 4080, 4805, 5700] },
            { name: "Echo", region: "EU", offset: 960, color: "#3b82f6", kills: [1020, 1380, 1745, 2200, 2900, 3300, 4200, 4950, 5820] },
            { name: "Method", region: "EU", offset: 960, color: "#fbbf24", kills: [1085, 1450, 1820, 2310, 3050, 3480, 4400, 5100, 6120] }
        ];

        const formatPreciseTime = (totalMinutes) => {
            const d = Math.floor(totalMinutes / 1440);
            const h = Math.floor((totalMinutes % 1440) / 60);
            const m = totalMinutes % 60;
            return `${d > 0 ? d + 'd ' : ''}${h.toString().padStart(2, '0')}h ${m.toString().padStart(2, '0')}m`;
        };

        function App() {
            const [isElapsed, setIsElapsed] = useState(true);
            const allBosses = RAIDS.flatMap(r => r.bosses);
            const maxMinutes = 7200; // 5 days

            return (
                <div className="max-w-6xl mx-auto p-4 md:p-10">
                    <header className="flex flex-col md:flex-row justify-between items-center mb-10 gap-6">
                        <div className="text-center md:text-left">
                            <h1 className="text-4xl font-black tracking-tight text-white italic underline decoration-orange-500 decoration-4 underline-offset-8">RWF LIVE</h1>
                        </div>
                        <div className="flex bg-slate-900 p-1 rounded-2xl border border-slate-800 shadow-2xl">
                            <button onClick={() => setIsElapsed(false)} className={`px-6 py-2 rounded-xl text-xs font-black transition-all ${!isElapsed ? 'bg-slate-700 text-white' : 'text-slate-500'}`}>CLOCK TIME</button>
                            <button onClick={() => setIsElapsed(true)} className={`px-6 py-2 rounded-xl text-xs font-black transition-all ${isElapsed ? 'bg-orange-600 text-white' : 'text-slate-500'}`}>ELAPSED (FAIR)</button>
                        </div>
                    </header>

                    {/* TOP VISUAL TIMELINE BOX */}
                    <div className="bg-slate-900/80 border border-slate-800 rounded-3xl p-8 mb-12 timeline-glow relative overflow-hidden">
                        <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-orange-500/20 to-transparent"></div>
                        
                        {/* Day vertical guides */}
                        {[1440, 2880, 4320, 5760].map(m => (
                            <div key={m} className="absolute h-full border-l border-slate-800/50 top-0" style={{ left: `${(m/maxMinutes)*100}%` }}>
                                <span className="absolute bottom-2 left-2 text-[9px] font-black text-slate-700 uppercase">Day {m/1440 + 1}</span>
                            </div>
                        ))}

                        {TEAMS.map((team, tIdx) => (
                            <div key={team.name} className="relative h-16 flex items-center mb-4 last:mb-0">
                                <div className="absolute w-full h-px bg-slate-800"></div>
                                <div className="absolute -left-2 translate-x-[-100%] pr-4 text-right">
                                    <span className="text-[10px] font-black uppercase" style={{color: team.color}}>{team.name}</span>
                                </div>
                                {team.kills.map((mins, i) => {
                                    const calcMins = isElapsed ? (mins - team.offset) : mins;
                                    const xPos = (calcMins / maxMinutes) * 100;
                                    if (xPos < 0) return null;
                                    return (
                                        <div key={i} className="boss-marker absolute group cursor-pointer" style={{ left: `${xPos}%` }}>
                                            <div className="w-4 h-4 rounded-full border-2 border-slate-950 shadow-lg" style={{ backgroundColor: team.color }}></div>
                                            <div className="absolute bottom-6 left-1/2 -translate-x-1/2 bg-white text-slate-950 px-2 py-1 rounded text-[9px] font-black opacity-0 group-hover:opacity-100 whitespace-nowrap z-50 transition-all">
                                                {allBosses[i]}: {formatPreciseTime(calcMins)}
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        ))}
                    </div>

                    {/* DETAILED RAID LIST */}
                    <div className="space-y-10">
                        {RAIDS.map((raid) => (
                            <div key={raid.name} className="space-y-4">
                                <div className={`h-1 w-24 bg-gradient-to-r ${raid.color} rounded-full`}></div>
                                <h2 className="text-2xl font-black tracking-tight">{raid.name}</h2>
                                
                                <div className="grid grid-cols-1 gap-3">
                                    {raid.bosses.map((boss) => {
                                        const gIdx = allBosses.indexOf(boss);
                                        return (
                                            <div key={boss} className="flex flex-col lg:flex-row items-center justify-between p-4 bg-slate-900/40 border border-slate-800 rounded-2xl gap-4 hover:bg-slate-800/40 transition-all">
                                                <div className="flex items-center gap-4 min-w-[200px]">
                                                    <span className="mono text-xs font-bold text-slate-600">0{gIdx + 1}</span>
                                                    <span className="font-bold text-slate-200">{boss}</span>
                                                </div>

                                                <div className="flex flex-wrap justify-center gap-3">
                                                    {TEAMS.map(team => {
                                                        const time = isElapsed ? (team.kills[gIdx] - team.offset) : team.kills[gIdx];
                                                        return (
                                                            <div key={team.name} className="bg-slate-950 px-4 py-2 rounded-xl border border-slate-800 min-w-[120px] text-center">
                                                                <div className="text-[9px] font-black uppercase tracking-widest mb-1" style={{color: team.color}}>{team.name}</div>
                                                                <div className="mono text-xs font-bold">{formatPreciseTime(time)}</div>
                                                            </div>
                                                        );
                                                    })}
                                                </div>

                                                <div className="lg:text-right min-w-[120px]">
                                                    <div className="text-[10px] text-slate-500 font-black uppercase tracking-tighter">Fastest Kill</div>
                                                    <div className="text-sm font-bold text-emerald-400">
                                                        {TEAMS.reduce((a, b) => (a.kills[gIdx] - a.offset < b.kills[gIdx] - b.offset ? a : b)).name}
                                                    </div>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
