<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RWF - World First vs Fastest</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;800&family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #020617; color: #f1f5f9; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .segment { transition: all 0.4s ease-out; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const SERVER_START_TIMES = { NA: "09:00", EU: "23:00" };
        const timeToMins = (str) => {
            const [h, m] = str.split(':').map(Number);
            return (h * 60) + m;
        };

        const OFFSETS = { NA: timeToMins(SERVER_START_TIMES.NA), EU: timeToMins(SERVER_START_TIMES.EU) };

        const RAIDS = [
            { name: "The Dreamrift", bosses: ["Chimarerus"] },
            { name: "The Voidspire", bosses: ["Imperator Averzian", "Vorasius", "Fallen-King Salhadaar", "Vaelgot & Ezzorak", "Lightblind Vanguard", "Crown of the Cosmos"] },
            { name: "March on Quel'Danas", bosses: ["Belo'ran", "Midnight Falls"] }
        ];

        const TEAMS = [
            { name: "Liquid", region: "NA", color: "#ef4444", kills: [600, 1100, 1400, 1900, 2800, 3200, 4100, 4900, 5800] },
            { name: "Echo", region: "EU", color: "#3b82f6", kills: [1500, 1600, 1850, 2400, 3100, 3500, 4200, 4950, 6000] },
            { name: "Method", region: "EU", color: "#fbbf24", kills: [1520, 1650, 1900, 2500, 3200, 3600, 4400, 5100, 6200] }
        ];

        const formatDur = (mins) => {
            const d = Math.floor(mins / 1440);
            const h = Math.floor((mins % 1440) / 60);
            const m = mins % 60;
            return `${d > 0 ? d + 'd ' : ''}${h}h ${m}m`;
        };

        function App() {
            const [mode, setMode] = useState('release');
            const allBosses = RAIDS.flatMap(r => r.bosses);

            return (
                <div className="max-w-6xl mx-auto p-4 md:p-10">
                    <header className="flex flex-col md:flex-row justify-between items-center mb-10 gap-6">
                        <h1 className="text-3xl font-black italic tracking-tighter uppercase">Race Hub <span className="text-orange-600">2026</span></h1>
                        <div className="flex bg-slate-900 p-1 rounded-2xl border border-slate-800">
                            <button onClick={() => setMode('global')} className={`px-5 py-2 rounded-xl text-[10px] font-black tracking-widest transition-all ${mode === 'global' ? 'bg-slate-700 text-white' : 'text-slate-500'}`}>GLOBAL TIME</button>
                            <button onClick={() => setMode('release')} className={`px-5 py-2 rounded-xl text-[10px] font-black tracking-widest transition-all ${mode === 'release' ? 'bg-orange-600 text-white' : 'text-slate-500'}`}>TIME SINCE RELEASE</button>
                        </div>
                    </header>

                    {/* TOP SEGMENTED PROGRESS BARS */}
                    <div className="bg-slate-900/50 border border-slate-800 rounded-3xl p-8 mb-12 shadow-2xl">
                        <div className="space-y-10">
                            {TEAMS.map((team) => (
                                <div key={team.name}>
                                    <div className="flex justify-between items-center mb-3">
                                        <span className="text-xs font-black uppercase tracking-widest" style={{color: team.color}}>{team.name}</span>
                                        <span className="mono text-[10px] font-bold text-slate-500 italic">Region: {team.region} ({SERVER_START_TIMES[team.region]} Start)</span>
                                    </div>
                                    <div className="flex gap-1.5 h-6">
                                        {allBosses.map((_, i) => {
                                            const isDead = team.kills[i] !== undefined;
                                            return (
                                                <div 
                                                    key={i} 
                                                    className={`flex-1 rounded-sm border border-black/20 segment ${isDead ? 'opacity-100 shadow-lg' : 'bg-slate-800/50 opacity-30'}`}
                                                    style={{ backgroundColor: isDead ? team.color : 'transparent' }}
                                                />
                                            );
                                        })}
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* BOSS COMPARISON LIST */}
                    <div className="space-y-12">
                        {RAIDS.map((raid) => (
                            <div key={raid.name} className="space-y-4">
                                <h2 className="text-[10px] font-black tracking-[0.5em] uppercase text-slate-500 pl-2">{raid.name}</h2>
                                <div className="grid grid-cols-1 gap-2">
                                    {raid.bosses.map((boss) => {
                                        const gIdx = allBosses.indexOf(boss);
                                        
                                        // LOGIC: WORLD FIRST (Lowest Global Minute)
                                        const wfTeam = TEAMS.reduce((a, b) => (a.kills[gIdx] < b.kills[gIdx] ? a : b));
                                        
                                        // LOGIC: FASTEST KILL (Lowest Minute from Release)
                                        const fastTeam = TEAMS.reduce((a, b) => {
                                            const aVal = a.kills[gIdx] - OFFSETS[a.region];
                                            const bVal = b.kills[gIdx] - OFFSETS[b.region];
                                            return aVal < bVal ? a : b;
                                        });

                                        return (
                                            <div key={boss} className="bg-slate-900/40 border border-slate-800 rounded-2xl p-6 flex flex-col lg:flex-row items-center gap-8">
                                                <div className="lg:w-1/4">
                                                    <div className="text-[10px] font-bold text-orange-500/50 mb-1 tracking-widest">#0{gIdx + 1}</div>
                                                    <div className="font-black text-lg text-slate-100 uppercase tracking-tight">{boss}</div>
                                                </div>

                                                <div className="flex-1 grid grid-cols-3 gap-3 w-full border-x border-slate-800 px-8">
                                                    {TEAMS.map(team => {
                                                        const offset = OFFSETS[team.region];
                                                        const val = mode === 'release' ? (team.kills[gIdx] - offset) : team.kills[gIdx];
                                                        return (
                                                            <div key={team.name} className="text-center">
                                                                <div className="text-[9px] font-black uppercase text-slate-500 mb-1">{team.name}</div>
                                                                <div className="mono text-xs font-bold text-slate-300">{formatDur(val)}</div>
                                                            </div>
                                                        );
                                                    })}
                                                </div>

                                                <div className="lg:w-1/4 flex flex-col gap-3">
                                                    <div className="flex justify-between items-center bg-slate-950/50 px-3 py-2 rounded-lg border border-slate-800">
                                                        <span className="text-[9px] font-black uppercase text-slate-600">World First</span>
                                                        <span className="text-[11px] font-black italic uppercase" style={{color: wfTeam.color}}>{wfTeam.name}</span>
                                                    </div>
                                                    <div className="flex justify-between items-center bg-slate-950 px-3 py-2 rounded-lg border border-slate-700 shadow-inner">
                                                        <span className="text-[9px] font-black uppercase text-orange-500">Fastest Kill</span>
                                                        <span className="text-[11px] font-black italic uppercase" style={{color: fastTeam.color}}>{fastTeam.name}</span>
                                                    </div>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
